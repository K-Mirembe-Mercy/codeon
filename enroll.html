<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enroll – CODEON Uganda | Learn Web Development</title>

<style>
:root{
  --bg:#11302e; --card:#ffffff15; --text:white; --accent:#00e0c6; --hover-accent:#00ffc8;
}
body{
  background: var(--bg);
  color: var(--text);
  font-family: "Segoe UI", sans-serif;
  overflow-x: hidden;
  margin:0;
  padding:0;
}
.container{
  max-width:600px;
  margin:60px auto;
  background: var(--card);
  padding:40px;
  border-radius:20px;
  backdrop-filter: blur(20px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
h2{text-align:center;margin-bottom:25px;}
input, select{
  width:100%;
  padding:14px;
  margin:12px 0;
  border-radius:10px;
  border:none;
  outline:none;
  font-size:16px;
}
button{
  width:100%;
  padding:14px;
  margin-top:20px;
  background: linear-gradient(45deg, gold, orange);
  color:black;
  font-weight:700;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
  font-size:16px;
}
button:hover{transform: scale(1.03);}
.success{margin-top:20px;padding:15px;background:#1f9d55;border-radius:8px;display:none;text-align:center;}
footer{text-align:center;padding:30px;margin-top:50px;opacity:0.7;}
</style>

<!-- Firebase 10 compat -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
  // Firebase init
  const firebaseConfig = {
    apiKey: "AIzaSy...", // your API key
    authDomain: "codeon-3cb1c.firebaseapp.com",
    projectId: "codeon-3cb1c"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // Anonymous login
  auth.signInAnonymously().catch(err=>console.error(err));

  // Enroll function
  async function enroll(){
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const level = document.getElementById("level").value;
    const success = document.getElementById("successMessage");

    if(!name || !email || !level){
      alert("Please complete all fields.");
      return;
    }

    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if(!emailPattern.test(email)){
      alert("Please enter a valid email address.");
      return;
    }

    try{
      await db.collection("students").doc(email).set({
        name: name,
        email: email,
        level: level,
        progress: 0,
        subscriptionStatus: "inactive",
        certificateStatus: "not_issued",
        lastVisited: firebase.firestore.FieldValue.serverTimestamp()
      });

      success.style.display = "block";

      // Redirect based on level
      setTimeout(()=>{
        if(level === "Level 1") window.location.href="course1.html";
        else if(level === "Level 2") window.location.href="course2.html";
        else if(level === "Level 3") window.location.href="https://store.pesapal.com/level3";
      }, 800);

    }catch(err){
      console.error(err);
      alert("Error saving enrollment. Try again later.");
    }
  }
</script>

</head>
<body>

<div class="container">
  <h2>Enroll Today</h2>
  <input type="text" id="name" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email Address">
  <select id="level">
    <option value="">Select Level</option>
    <option value="Level 1">Level 1 – Free</option>
    <option value="Level 2">Level 2 – Free</option>
    <option value="Level 3">Level 3 – UGX 50,000</option>
  </select>
  <button onclick="enroll()">Enroll Now</button>
  <div class="success" id="successMessage">Enrollment successful! Redirecting...</div>
</div>

<footer>
  © 2026 CODEON Uganda | Built in Uganda 🇺🇬
</footer>

</body>
</html>
